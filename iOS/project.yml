name: Antler Log
options:
  bundleIdPrefix: com.shimondeitel.antlerlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  AntlerLog:
    type: application
    platform: iOS
    sources:
      - path: AntlerLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.antlerlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: AntlerLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AntlerLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AntlerLogTests
      - path: AntlerLog.storekit
    dependencies:
      - target: AntlerLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.antlerlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AntlerLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AntlerLogUITests
    dependencies:
      - target: AntlerLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.antlerlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Antler Log:
    build:
      targets:
        AntlerLog: all
        AntlerLogTests: [test]
        AntlerLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: AntlerLog.storekit
    test:
      config: Debug
      storeKitConfiguration: AntlerLog.storekit
      targets:
        - AntlerLogTests
        - AntlerLogUITests
    archive:
      config: Release
